---
- name: Configurar Lab 3 - Servidor web vulnerable
  hosts: webserver
  # No necesitamos become (sudo) porque ya somos root en el contenedor
  become: false

  tasks:

    # Verificamos que el directorio de uploads existe y tiene permisos correctos
    - name: Asegurar permisos del directorio uploads
      file:
        path: /var/www/html/uploads
        state: directory
        mode: '0777'
        owner: www-data
        group: www-data

    # Verificamos que la flag está en su lugar
    - name: Verificar que la flag existe
      stat:
        path: /susdir/.flag
      register: flag_stat

    - name: Mostrar estado de la flag
      debug:
        msg: "Flag en su lugar: {{ flag_stat.stat.exists }}"

    # Nos aseguramos de que PHP está habilitado en Apache
    - name: Asegurar que PHP está activo
      command: php -v
      register: php_version

    - name: Mostrar versión PHP
      debug:
        msg: "{{ php_version.stdout_lines[0] }}"
